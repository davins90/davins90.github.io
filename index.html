function generatePDF() {
  if (window.jspdf) { _buildPDF(); }
  else {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js';
    s.onload = () => _buildPDF();
    s.onerror = () => alert('Could not load PDF library. Please try again.');
    document.head.appendChild(s);
  }
}

  const writeBoldText = (text, x, yPos, maxW, lineH, linkUrl) => {
    const segments = [];
    const parts = text.split(/\*\*(.*?)\*\*/g);
    parts.forEach((part, i) => { if (part !== '') segments.push({ text: part, bold: i % 2 === 1 }); });
    let curX = x, curY = yPos;
    segments.forEach(seg => {
      seg.text.split(/(\s+)/).forEach(word => {
        if (word === '') return;
        if (seg.bold) { setFont('bold', doc.getFontSize()); doc.setTextColor(...(linkUrl ? accent : black)); }
        else { setFont('normal', doc.getFontSize()); doc.setTextColor(...(linkUrl ? accent : gray)); }
        const wordW = doc.getTextWidth(word);
        if (curX + wordW > x + maxW && word.trim() !== '') { curX = x; curY += lineH; }
        if (linkUrl) doc.textWithLink(word, curX, curY, { url: linkUrl });
        else doc.text(word, curX, curY);
        curX += wordW;
      });
    });
    return curY + lineH;
  };

  const writeText = (text, x, yPos, maxW, lineH) => {
    const lines = doc.splitTextToSize(text, maxW);
    doc.text(lines, x, yPos);
    return yPos + lines.length * lineH;
  };

  const sectionTitle = (title, yPos) => {
    setFont('bold', 9); doc.setTextColor(...black);
    doc.text(title.toUpperCase(), marginL, yPos);
    doc.setDrawColor(214, 211, 209); doc.setLineWidth(0.3);
    doc.line(marginL + doc.getTextWidth(title.toUpperCase()) + 2, yPos - 0.5, W - marginR, yPos - 0.5);
    return yPos + 5;
  };

  // HEADER
  setFont('bold', 18); doc.setTextColor(...black);
  doc.text(d.name.toUpperCase(), W / 2, y, { align: 'center' }); y += 6;
  setFont('normal', 8.5); doc.setTextColor(...lightGray);
  doc.text(d.title.toUpperCase(), W / 2, y, { align: 'center', charSpace: 1.5 }); y += 5;
  setFont('normal', 8); doc.setTextColor(...gray);
  doc.text(`${c.location} | ${c.phone} | ${c.email}`, W / 2, y, { align: 'center' }); y += 4;

  const links = [c.linkedin, c.github, c.website];
  setFont('bold', 8); doc.setTextColor(...accent);
  const totalLinkW = doc.getTextWidth(links.map(l => l.label).join('  |  '));
  let linkX = (W - totalLinkW) / 2;
  links.forEach((link, i) => {
    doc.setTextColor(...accent);
    doc.textWithLink(link.label, linkX, y, { url: link.url });
    linkX += doc.getTextWidth(link.label);
    if (i < links.length - 1) {
      doc.setTextColor(...lightGray);
      doc.text('  |  ', linkX, y);
      linkX += doc.getTextWidth('  |  ');
    }
  });
  y += 3;
  doc.setDrawColor(28, 25, 23); doc.setLineWidth(0.5);
  doc.line(marginL, y, W - marginR, y); y += 5;

  // SUMMARY
  y = sectionTitle('Summary', y);
  setFont('normal', 8); doc.setTextColor(...gray);
  y = writeText(d.summary, marginL, y, contentW, 3.5); y += 4;

  // SKILLS
  y = sectionTitle('Skills', y);
  Object.entries(d.skills).forEach(([cat, items]) => {
    setFont('bold', 8); doc.setTextColor(...black);
    doc.text(cat + ': ', marginL, y);
    const catW = doc.getTextWidth(cat + ': ');
    setFont('normal', 8); doc.setTextColor(...gray);
    y = writeText(items, marginL + catW, y, contentW - catW, 3.5); y += 1;
  });
  y += 3;

  // EXPERIENCE
  y = sectionTitle('Work Experience', y);
  d.experience.forEach(exp => {
    setFont('bold', 9); doc.setTextColor(...black);
    doc.text(exp.role, marginL, y);
    setFont('bold', 8); doc.setTextColor(...lightGray);
    doc.text(exp.period, W - marginR, y, { align: 'right' }); y += 3.5;
    setFont('italic', 8); doc.setTextColor(...gray);
    doc.text(exp.company + ', ' + exp.location, marginL, y); y += 3.5;
    if (exp.description) {
      setFont('normal', 7.5); doc.setTextColor(...gray);
      y = writeBoldText(exp.description, marginL, y, contentW, 3.2, null); y += 1;
    }
    exp.highlights.forEach(h => {
      const text = getHighlightText(h);
      const url = getHighlightUrl(h);
      setFont('normal', 7.5); doc.setTextColor(...gray);
      doc.text('•', marginL + 1, y);
      y = writeBoldText(text, marginL + 5, y, contentW - 5, 3.2, url); y += 0.5;
    });
    y += 3;
  });

  // PROJECTS + CERTS
  const colW = contentW / 2 - 3, col1X = marginL, col2X = marginL + colW + 6, startY = y;

  let yL = startY;
  setFont('bold', 9); doc.setTextColor(...black);
  doc.text('PROJECTS', col1X, yL);
  doc.setDrawColor(214, 211, 209); doc.setLineWidth(0.3);
  doc.line(col1X + doc.getTextWidth('PROJECTS') + 2, yL - 0.5, col1X + colW, yL - 0.5); yL += 4;
  d.projects.forEach(p => {
    setFont('bold', 7.5);
    if (p.url && p.url !== '#') { doc.setTextColor(...accent); doc.textWithLink(p.name + ':', col1X, yL, { url: p.url }); }
    else { doc.setTextColor(...black); doc.text(p.name + ':', col1X, yL); }
    yL += 3;
    setFont('normal', 7); doc.setTextColor(...gray);
    yL = writeText(p.desc, col1X, yL, colW, 2.8); yL += 2;
  });

  let yR = startY;
  setFont('bold', 9); doc.setTextColor(...black);
  doc.text('CERTIFICATIONS', col2X, yR);
  doc.line(col2X + doc.getTextWidth('CERTIFICATIONS') + 2, yR - 0.5, col2X + colW, yR - 0.5); yR += 4;
  d.certifications.forEach(cert => {
    setFont('normal', 7.5);
    if (cert.url && cert.url !== '#') { doc.setTextColor(...accent); doc.textWithLink('•  ' + cert.label, col2X, yR, { url: cert.url }); }
    else { doc.setTextColor(...gray); doc.text('•  ' + cert.label, col2X, yR); }
    yR += 3.5;
  });
  yR += 3;
  setFont('bold', 9); doc.setTextColor(...black);
  doc.text('EDUCATION', col2X, yR);
  doc.line(col2X + doc.getTextWidth('EDUCATION') + 2, yR - 0.5, col2X + colW, yR - 0.5); yR += 4;
  setFont('normal', 7.5); doc.setTextColor(...gray);
  writeText(d.education, col2X, yR, colW, 3.2);

  doc.save('cv_daniele_davino.pdf');
}

render();
</script>
</body>
</html>
